kind = "web"
previewPath = "/invitation/"
title = "Wedding Invitation"
version = "1.0.0"
id = "artifacts/wedding-invite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/invitation/" ]
localPort = 24366

[services.development]
run = "pnpm --filter @workspace/wedding-invite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wedding-invite", "run", "build" ]
publicDir = "artifacts/wedding-invite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/invitation/*"
to = "/invitation/index.html"

[services.env]
PORT = "24366"
BASE_PATH = "/invitation/"
