name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @workspace/wedding-invite run build

      - name: Verify build output
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Build output listing ==="
          ls -la artifacts/wedding-invite/dist/public
          echo "=== Build subtree ==="
          find artifacts/wedding-invite/dist/public -maxdepth 2 | sort

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./artifacts/wedding-invite/dist/public

      - uses: actions/deploy-pages@v2
